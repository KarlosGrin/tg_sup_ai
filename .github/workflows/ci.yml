# ═══════════════════════════════════════════════════════════════
# CI/CD Pipeline для tg_sup_ai
# ═══════════════════════════════════════════════════════════════
# Этапы:
#   1. Lint — ruff (pyflakes, pycodestyle, pep8-naming, security)
#   2. Test — pytest (unit-тесты песочницы)
#   3. Security — pip-audit (уязвимости зависимостей)
#   4. Build — Docker-образ sandbox
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "*.md"
      - "INSTRUCTIONS.md"
      - ".env.example"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "INSTRUCTIONS.md"
      - ".env.example"
  # Ручной запуск
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DOCKER_SANDBOX_IMAGE: tg_sup_ai-sandbox

jobs:

  # ═══════════════════════════════════════════════════════════
  # Линтинг
  # ═══════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: ruff check . --output-format=github

  # ═══════════════════════════════════════════════════════════
  # Тестирование
  # ═══════════════════════════════════════════════════════════
  test:
    name: 🧪 Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install project dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Create .env for tests
        run: |
          cp .env.example .env
          # Тесты принудительно отключают Docker (через monkeypatch),
          # но для безопасного запуска тестов — явно DOCKER_ENABLED=false
          echo "DOCKER_ENABLED=false" >> .env

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -x

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.python-version }}
          path: tests/**/__pycache__/
          retention-days: 3

  # ═══════════════════════════════════════════════════════════
  # Security audit (pip-audit)
  # ═══════════════════════════════════════════════════════════
  security-audit:
    name: 🛡️ Security audit (pip-audit)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit --desc on --ignore-vuln PYSEC-XXXX-XXXX 2>&1 | tee pip-audit-report.txt

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # Docker-образ sandbox
  # ═══════════════════════════════════════════════════════════
  docker-sandbox:
    name: 🐳 Build sandbox image
    runs-on: ubuntu-latest
    needs: [security-audit]
    # Собираем только на push (не на PR)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          push: false
          tags: ${{ env.DOCKER_SANDBOX_IMAGE }}:latest,${{ env.DOCKER_SANDBOX_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Проверка, что образ не содержит опасных утилит
      - name: Scan sandbox for vulnerable packages (trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_SANDBOX_IMAGE }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # Итоговый статус
  # ═══════════════════════════════════════════════════════════
  status:
    name: ✅ Status
    runs-on: ubuntu-latest
    needs: [lint, test, security-audit, docker-sandbox]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "## CI Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Security audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker build | ${{ needs.docker-sandbox.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some checks failed." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
